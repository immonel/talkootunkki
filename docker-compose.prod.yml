services:
  talkootunkki:
    build: .
    container_name: talkootunkki
    restart: always
    environment:
      TG_BOT_API_TOKEN: ${TG_BOT_API_TOKEN}
      WS_EVENT_BROADCAST_INTERVAL: ${WS_EVENT_BROADCAST_INTERVAL}
      APP_SECRET_KEY: ${APP_SECRET_KEY}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      PORT: ${BACKEND_PORT}
      VIRTUAL_HOST: ${DOMAIN_NAME}
      VIRTUAL_PORT: ${BACKEND_PORT}
      LETSENCRYPT_HOST: ${DOMAIN_NAME}
      LETSENCRYPT_EMAIL: ${ACME_EMAIL:-}
    volumes:
      - ./data:/data
    expose:
      - "${BACKEND_PORT}"
    networks:
      - app-network

  nginx-proxy:
    image: nginxproxy/nginx-proxy:1.10
    container_name: talkootunkki_nginx_proxy
    restart: always
    volumes:
      - certs:/etc/nginx/certs:ro
      - html:/usr/share/nginx/html
      - ./nginx/vhost.d:/etc/nginx/vhost.d:ro
      - /var/run/docker.sock:/tmp/docker.sock:ro
    depends_on:
      - talkootunkki
    networks:
      - app-network
    ports:
      - 80:80
      - 443:443

  acme-companion:
    image: nginxproxy/acme-companion:2.6.3
    container_name: talkootunkki_acme_companion
    restart: always
    depends_on:
      - nginx-proxy
    environment:
      DEFAULT_EMAIL: ${ACME_EMAIL:-}
      NGINX_PROXY_CONTAINER: talkootunkki_nginx_proxy
      ACME_CHALLENGE: DNS-01
      ACMESH_DNS_API_CONFIG: |-
        DNS_API: dns_cf
        CF_Token: ${CF_Token:-}
        CF_Account_ID: ${CF_Account_ID:-}
        CF_Zone_ID: ${CF_Zone_ID:-}
    volumes:
      - certs:/etc/nginx/certs:rw
      - html:/usr/share/nginx/html
      - acme:/etc/acme.sh
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - app-network

volumes:
  certs:
  html:
  acme:

networks:
  app-network:
    driver: bridge
