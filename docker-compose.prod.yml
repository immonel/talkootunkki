version: "3"

services:
  talkootunkki:
    build: .
    container_name: talkootunkki
    restart: always
    environment:
      TG_BOT_API_TOKEN: ${TG_BOT_API_TOKEN}
      WS_EVENT_BROADCAST_INTERVAL: ${WS_EVENT_BROADCAST_INTERVAL}
      APP_SECRET_KEY: ${APP_SECRET_KEY}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      PORT: ${BACKEND_PORT}
    volumes:
      - ./data:/data
    networks:
      - app-network

  nginx:
    image: nginx:mainline-alpine
    container_name: talkootunkki_nginx
    restart: always
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - dhparam:/etc/ssl/certs
      - web-root:/var/www/html
    depends_on:
      - talkootunkki
    networks:
      - app-network
    ports:
      - 80:80
      - 443:443

  # certbot:
  #   image: certbot/certbot
  #   container_name: talkootunkki_certbot
  #   restart: always
  #   volumes:
  #     - certbot-etc:/etc/letsencrypt
  #     - certbot-var:/var/lib/letsencrypt
  #     - web-root:/var/www/html
  #   command: >
  #     renew
  #       --webroot
  #       --webroot-path=/var/www/html
  #       --quiet
  #       --agree-tos
  #       --no-eff-email
  #       --deploy-hook 'docker kill --signal=HUP talkootunkki_nginx'

volumes:
  certbot-etc:
  certbot-var:
  web-root:
  dhparam:
    driver: local
    driver_opts:
      type: none
      device: ./nginx
      o: bind

networks:
  app-network:
    driver: bridge
